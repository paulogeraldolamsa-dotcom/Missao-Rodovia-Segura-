<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Missão Rodovia Segura</title>
<style>
body{font-family:Arial,sans-serif;background:#eef3f7;margin:0}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#fff;padding:20px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
button{padding:10px 14px;margin:6px;border:none;border-radius:8px;cursor:pointer}
.option{display:block;width:100%;text-align:left}
#progress{height:20px;background:#ddd;border-radius:10px;overflow:hidden}
#bar{height:100%;width:0;background:#4caf50}
img{max-width:100%;max-height:260px;border-radius:8px}
</style>
</head>
<body>
<div class="container">
<div class="card">
<h1>🚦 Missão Rodovia Segura</h1>
<div id="app"></div>
</div>
</div>

<script>
const WEBAPP="https://script.google.com/macros/s/AKfycbz7e3qLtkzdrnE5OcodUEq43MDW7xuFBivdBtuqiD-87vquU_dkPg1RWi4GGDnqDfp6/exec";

const perguntas=[];
for(let i=1;i<=30;i++){
 perguntas.push({
  pergunta:`Pergunta ${i}: Segurança viária e engenharia rodoviária`,
  imagem:"https://upload.wikimedia.org/wikipedia/commons/thumb/f/f9/Brazil_road_sign_R-19.svg/240px-Brazil_road_sign_R-19.svg.png",
  respostas:["Resposta correta","Alternativa B","Alternativa C","Alternativa D"],
  correta:0
 });
}

let jogador="",quiz=[],idx=0,pontos=0;

function embaralhar(a){return [...a].sort(()=>Math.random()-0.5);}

function inicio(){
 document.getElementById('app').innerHTML=`
 <p>Digite seu nome:</p>
 <input id="nome" style="padding:8px;width:250px">
 <br><br>
 <button onclick="comecar()">Iniciar Missão</button>`;
}

function comecar(){
 jogador=document.getElementById('nome').value.trim();
 if(!jogador){alert("Digite um nome");return;}
 quiz=embaralhar(perguntas).slice(0,15);
 idx=0;pontos=0;
 mostrar();
}

function mostrar(){
 let p=quiz[idx];
 let html=`<div id="progress"><div id="bar" style="width:${(idx/15)*100}%"></div></div>
 <p>Pergunta ${idx+1} de 15</p>
 <img src="${p.imagem}">
 <h3>${p.pergunta}</h3>`;
 p.respostas.forEach((r,i)=>{
  html+=`<button class="option" onclick="resp(${i})">${r}</button>`;
 });
 document.getElementById('app').innerHTML=html;
}

function resp(i){
 if(i===quiz[idx].correta)pontos++;
 idx++;
 if(idx<15)mostrar(); else finalizar();
}

async function finalizar(){
 const erros=15-pontos;
 try{
 await fetch(WEBAPP,{
 method:"POST",
 body:JSON.stringify({nome:jogador,pontos:pontos})
 });
 }catch(e){}
 let classe="Aprendiz da Segurança";
 if(pontos>=13) classe="Engenheiro da Rodovia Segura";
 else if(pontos>=10) classe="Especialista Viário";
 else if(pontos>=7) classe="Guardião da Estrada";

 let ranking=[];
 try{
 const r=await fetch(WEBAPP);
 ranking=await r.json();
 }catch(e){}

 let rank="<ol>";
 ranking.forEach(x=>rank+=`<li>${x.nome} - ${x.pontos}</li>`);
 rank+="</ol>";

 document.getElementById('app').innerHTML=`
 <h2>Missão Concluída</h2>
 <p><b>${jogador}</b></p>
 <p>Acertos: ${pontos}</p>
 <p>Erros: ${erros}</p>
 <p>${classe}</p>
 <h3>Top 10</h3>
 ${rank}
 <button onclick="inicio()">Jogar novamente</button>`;
}
inicio();
</script>
</body>
</html>
